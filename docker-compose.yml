x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  # ===========================================================================
  # Reverse Proxy / TLS Termination
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: sentinel-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/nginx/tls:/etc/nginx/tls:ro
      - frontend_build:/usr/share/nginx/html:ro
    networks:
      - edge
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    logging: *default-logging

  # ===========================================================================
  # Application Layer
  # ===========================================================================
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: sentinel-api
    restart: unless-stopped
    env_file: .env
    environment:
      - UVICORN_WORKERS=3
    volumes:
      - ./data/sync:/opt/sentinel/sync:ro
    networks:
      - edge
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 12G
    logging: *default-logging

  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: sentinel-worker
    restart: unless-stopped
    command: ["celery", "-A", "src.worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file: .env
    volumes:
      - ./data/sync:/opt/sentinel/sync
    networks:
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "src.worker.celery_app", "inspect", "ping", "--timeout=10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
    logging: *default-logging

  beat:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: sentinel-beat
    restart: unless-stopped
    command: ["celery", "-A", "src.worker.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    networks:
      - app
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    logging: *default-logging

  # ===========================================================================
  # AI Inference Layer
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    logging: *default-logging

  # ===========================================================================
  # Data Layer
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_rag}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 8G
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      - "--maxmemory"
      - "3gb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinel-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 12G
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: sentinel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    logging: *default-logging

  # ===========================================================================
  # Monitoring (profile: monitoring)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2G
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://${ALLOWED_HOSTS:-localhost}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    logging: *default-logging

  loki:
    image: grafana/loki:latest
    container_name: sentinel-loki
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2G
    logging: *default-logging

  promtail:
    image: grafana/promtail:latest
    container_name: sentinel-promtail
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - monitoring
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    logging: *default-logging

  # ===========================================================================
  # Auth (profile: auth)
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: sentinel-keycloak
    restart: unless-stopped
    profiles: ["auth"]
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sentinel_rag}
      KC_DB_USERNAME: ${POSTGRES_USER:-sentinel}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_PROXY: edge
    networks:
      - app
      - data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
    logging: *default-logging

  # ===========================================================================
  # Secrets Management (profile: vault)
  # ===========================================================================
  vault:
    image: hashicorp/vault:latest
    container_name: sentinel-vault
    restart: unless-stopped
    profiles: ["vault"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
    volumes:
      - vault_data:/vault/data
      - ./config/vault:/vault/config:ro
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    logging: *default-logging

# =============================================================================
# Networks
# =============================================================================
networks:
  edge:
    name: sentinel-edge
    driver: bridge
  app:
    name: sentinel-app
    driver: bridge
  data:
    name: sentinel-data
    driver: bridge
    internal: true
  monitoring:
    name: sentinel-monitoring
    driver: bridge
    internal: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  loki_data:
  vault_data:
  frontend_build:
